<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudioMeow — Фотостудия для котиков</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="design.css">
</head>
<body>

    <header class="main_header">
        <h1 class="navbar_brand">StudioMeow</h1>
        <nav>
            <a class="nav-link" href="#about">О нас</a>
            <a class="nav-link" href="#gallery">Галерея</a>
            <a class="nav-link" href="#booking">Запись</a>
        </nav>
    </header>

    <main>
        <section id="about" class="about">
            <div class="about_content">
                <h1>Тематические фотосессии для ваших котиков</h1>
                <p>Мы создаем уникальные образы: от пушистых викингов до изысканных аристократов. Профессиональный подход к каждому хвосту.</p>
                <a href="#booking" class="btn_main">Забронировать</a>
            </div>
            <div class="image">📸</div>
        </section>

        <section id="gallery" class="gallery">
            <div>
                <h1 class="section_title">Наши работы</h1>
                <div class="grid_gallery">
                    <figure><img src="cat1.jpeg" alt="Кот"></figure>
                    <figure><img src="cat2.jpeg" alt="Кот"></figure>
                    <figure><img src="cat3.jpeg" alt="Кот"></figure>
                </div>
            </div>
        </section>

        <section id="booking" class="booking">
            <div class="form_card">
                <h1 class="section_title">Записаться</h1>
                <form id="orderForm" class="needs_validation" novalidate>
                    <div class="input_group">
                        <input type="text" placeholder="Ваше имя" required>
                        <input type="email" placeholder="Email" required>
                        <input type="text" placeholder="Имя котика" required>
                    </div>
                    <button type="submit" class="btn_main">Отправить заявку</button>
                </form>
            </div>
        </section>
    </main>

    <footer class="main_footer">
        <div>
            <p>&copy; 2026 StudioMeow. Мяу!</p>
        </div>
    </footer>

    <script src="https://jsdelivr.net"></script>
    <script>
        (() => {
            'use strict'
            const forms = document.querySelectorAll('.needs_validation')
            forms.forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    } else {
                        event.preventDefault()
                        alert('Мяу! Мы получили вашу заявку.')
                    }
                    form.classList.add('was_validated')
                }, false)
            })
        })()
    </script>
</body>
</html>
